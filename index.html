<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro-Fit Elite | Video & Pro Library</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --accent: #3b82f6; 
    --bg: #0b0f1a;
    --card-bg: #111827;
    --input-bg: #0f172a;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
}

body { margin:0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color:white; padding-bottom: 100px; }
.header { padding:20px; text-align:center; font-size:22px; font-weight:800; color: var(--accent); letter-spacing: 1px; }
.container { padding:15px; max-width: 600px; margin: 0 auto; }
.card { background: var(--card-bg); padding:18px; border-radius:20px; margin-bottom:15px; border: 1px solid rgba(255,255,255,0.05); }

.progress-container { height: 6px; background: #1e293b; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
#p-bar { height: 100%; width: 0%; background: var(--success); transition: 0.5s; }

input, select, button, textarea { width:100%; padding:12px; margin-top:8px; border-radius:12px; border:none; outline: none; box-sizing: border-box; font-size: 14px; }
input, select, textarea { background: var(--input-bg); color:white; border: 1px solid #1e293b; }
textarea { resize: none; height: 60px; }
button { background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
button:active { transform: scale(0.97); }

.exercise { background: var(--input-bg); padding:15px; border-radius:16px; margin-top:12px; border: 1px solid #1e293b; position: relative; }
.set { display:flex; align-items:center; justify-content:space-between; padding:8px; margin-top:8px; background: rgba(255,255,255,0.03); border-radius:10px; }
.set-inputs { display: flex; gap: 5px; align-items: center; }
.set input { width: 50px; padding: 6px; background: #1e293b; text-align: center; margin: 0;}
.done-btn { width: 50px !important; margin: 0 !important; background: #1e293b; font-size: 12px; }
.set.done { opacity: 0.3; }
.set.done .done-btn { background: var(--success); }

.video-btn { background: #f00; color: white; width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; margin-left: 10px; }

.timer-float { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 12px 25px; border-radius: 50px; display: flex; gap: 15px; z-index: 1000; box-shadow: 0 5px 25px rgba(0,0,0,0.6); }
.modal { position:fixed; inset:0; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index: 2000; }
.modal-content { background: var(--card-bg); padding:25px; border-radius:24px; width:85%; max-height: 80vh; overflow-y: auto; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; text-align: center; }
.stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
.stat-value { font-size: 16px; font-weight: bold; color: var(--warning); }
</style>
</head>

<body>
<div class="header">PRO-FIT ELITE+</div>

<div class="timer-float" id="floater" style="display:none;">
    <span id="mainT">⏱ 00:00</span>
    <span id="restT" style="color: #d1d5db;">⏳ Відпочинок</span>
</div>

<div class="container">
    <div class="progress-container"><div id="p-bar"></div></div>

    <div class="card">
        <input type="date" id="date">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Тоннаж дня</div>
                <div class="stat-value" id="totalVolume">0 кг</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Прогноз 1ПМ</div>
                <div class="stat-value" id="topOnePM">0 кг</div>
            </div>
        </div>
        <textarea id="dayNotes" placeholder="Настрої, заміни вправ, відчуття..." onchange="saveNotes()"></textarea>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size:16px;">📈 Аналітика</h3>
        <select id="chartExSelect" onchange="updateChart()"></select>
        <div id="chartBox" style="height:180px;"><canvas id="myChart"></canvas></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size:14px; color:var(--accent);">⚡ Швидкі спліти</h3>
        <div style="display:flex; gap:5px;">
            <button onclick="applySplit('Верх')">ВЕРХ</button>
            <button onclick="applySplit('Низ')">НИЗ</button>
            <button onclick="applySplit('Full')">FULL</button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">➕ Додати вправу</h3>
        <input id="name" list="popular" placeholder="Назва вправи">
        <datalist id="popular">
            <option value="Жим штанги лежачи"><option value="Присідання зі штангою"><option value="Станова тяга"><option value="Підтягування">
            <option value="Віджимання на брусах"><option value="Тяга штанги в нахилі"><option value="Армійський жим"><option value="Випади з гантелями">
            <option value="Підйом штанги на біцепс"><option value="Французький жим"><option value="Тяга верхнього блоку"><option value="Жим гантелей сидячи">
            <option value="Розведення гантелей"><option value="Згинання ніг у тренажері"><option value="Розгинання ніг"><option value="Прес (скручування)">
            <option value="Шраги"><option value="Гіперекстензія"><option value="Тяга гантелі до пояса">
        </datalist>
        <div style="display:flex; gap:5px;">
            <input id="sets" type="number" placeholder="Сети">
            <input id="reps" type="number" placeholder="Повт">
            <input id="weight" type="number" placeholder="кг">
        </div>
        <input id="tempo" placeholder="Темп (напр. 3-0-1-0)" style="margin-top:5px;">
        <button onclick="add()">ДОДАТИ В ПЛАН</button>
    </div>

    <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="start()" style="background: var(--success)">▶ СТАРТ</button>
        <button onclick="finish()" style="background: #6366f1">🏁 ФІНІШ</button>
        <button onclick="generatePDF()" style="background: var(--danger); grid-column: span 2;">📄 ЕКСПОРТ PDF</button>
        <button onclick="copyDay()">📋 COPY</button>
        <button onclick="pasteDay()">📥 PASTE</button>
    </div>

    <div id="list"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2 style="margin:0">🏁 Результати</h2>
        <div id="summaryResult" style="margin:15px 0; font-size:14px; line-height:1.6;"></div>
        <button onclick="document.getElementById('modal').style.display='none'">ЗАКРИТИ</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("fit")) || {};
let durations = JSON.parse(localStorage.getItem("fit_durations")) || {};
let notes = JSON.parse(localStorage.getItem("fit_notes")) || {};
let date = "";
let startTime = null;
let currentDuration = "00:00";
let mainInt, restInt, done = {};
let myChart = null;

const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

document.getElementById("date").onchange = (e) => {
    date = e.target.value;
    document.getElementById("dayNotes").value = notes[date] || "";
    updateUI();
};

function save() { 
    localStorage.setItem("fit", JSON.stringify(data)); 
    localStorage.setItem("fit_durations", JSON.stringify(durations));
    localStorage.setItem("fit_notes", JSON.stringify(notes));
}

function saveNotes() { notes[date] = document.getElementById("dayNotes").value; save(); }

function updateUI() {
    render();
    fillChartSelect();
    updateChart();
    calcVolume();
}

function fillChartSelect() {
    let select = document.getElementById("chartExSelect");
    let oldVal = select.value;
    let exs = new Set();
    Object.values(data).forEach(day => day.forEach(e => exs.add(e.name)));
    select.innerHTML = '<option value="">Оберіть вправу</option>';
    exs.forEach(e => select.innerHTML += `<option value="${e}">${e}</option>`);
    select.value = oldVal;
}

function calcVolume() {
    if(!data[date]) return;
    let vol = 0;
    data[date].forEach(ex => ex.arr.forEach(s => vol += (s.w * s.r)));
    document.getElementById("totalVolume").innerText = vol + " кг";
    
    let totalSets = 0, doneSets = 0;
    data[date].forEach((ex, i) => {
        totalSets += ex.arr.length;
        ex.arr.forEach((s, j) => { if(done[i+'-'+j]) doneSets++; });
    });
    document.getElementById("p-bar").style.width = totalSets > 0 ? (doneSets/totalSets*100)+"%" : "0%";
}

function openVideo(name) {
    const query = encodeURIComponent(name + " техніка виконання");
    window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
}

function add(cN, cS, cR, cW, cT) {
    let n = cN || document.getElementById("name").value;
    let s = cS || document.getElementById("sets").value;
    let r = cR || document.getElementById("reps").value;
    let w = cW || document.getElementById("weight").value;
    let t = cT || document.getElementById("tempo").value || "стандарт";

    if(!date || !n || !s) return;
    if(!data[date]) data[date] = [];
    let sets = [];
    for(let i=0; i<+s; i++) sets.push({r: +r, w: +w});
    data[date].push({name: n, arr: sets, tempo: t});
    save(); updateUI();
    
    if(!cN) { 
        document.getElementById("name").value = ""; 
        document.getElementById("sets").value = ""; 
    }
}

function applySplit(type) {
    const s = {
        'Верх': [['Жим лежачи', 3, 10, 40, '3-0-1-0'], ['Тяга в нахилі', 3, 10, 30, '2-1-1-0']],
        'Низ': [['Присідання', 3, 10, 50, '3-1-1-0'], ['Мертва тяга', 3, 10, 60, '2-0-1-0']],
        'Full': [['Присідання', 3, 10, 40, '3-1-1-0'], ['Жим штанги', 3, 10, 40, '3-0-1-0']]
    };
    s[type].forEach(x => add(x[0], x[1], x[2], x[3], x[4]));
}

function render() {
    let l = document.getElementById("list");
    l.innerHTML = "";
    if(!data[date]) return;

    data[date].forEach((ex, i) => {
        let setsH = ex.arr.map((s, j) => `
            <div class="set ${done[i+'-'+j]?'done':''}">
                <div class="set-inputs">
                    <input type="number" value="${s.r}" onchange="edit(${i},${j},'r',this.value)"> 
                    <small>×</small>
                    <input type="number" value="${s.w}" onchange="edit(${i},${j},'w',this.value)">
                </div>
                <button class="done-btn" onclick="doneSet(${i},${j})">${done[i+'-'+j]?'✔':'OK'}</button>
            </div>`).join("");
        
        l.innerHTML += `
            <div class="exercise">
                <div style="display:flex; align-items:center;">
                    <b style="flex:1;">${ex.name}</b>
                    <button class="video-btn" onclick="openVideo('${ex.name}')" title="Дивитись техніку">📺</button>
                    <button onclick="delEx(${i})" style="width:25px; background:none; color:var(--danger); border:none; margin-left:10px;">✕</button>
                </div>
                <div style="font-size:10px; color:var(--warning); margin-top:5px;">Темп: ${ex.tempo}</div>
                ${setsH}
            </div>`;
    });
}

function doneSet(i, j) {
    done[i+'-'+j] = !done[i+'-'+j];
    if(done[i+'-'+j]) showRest(90);
    updateUI();
}

function showRest(s) {
    let t = s; clearInterval(restInt);
    restInt = setInterval(() => {
        document.getElementById("restT").innerText = `⏳ ${t}s`;
        if(t-- <= 0) { clearInterval(restInt); beep.play(); document.getElementById("restT").innerText = "ГОТОВО!"; }
    }, 1000);
}

function edit(i, j, p, v) { data[date][i].arr[j][p] = +v; save(); updateUI(); }
function delEx(i) { data[date].splice(i,1); save(); updateUI(); }

function start() {
    startTime = new Date(); document.getElementById("floater").style.display = "flex";
    mainInt = setInterval(() => {
        let d = Math.floor((new Date() - startTime)/1000);
        currentDuration = `${Math.floor(d/60)}:${(d%60).toString().padStart(2,'0')}`;
        document.getElementById("mainT").innerText = `⏱ ${currentDuration}`;
    }, 1000);
}

function finish() {
    clearInterval(mainInt);
    durations[date] = currentDuration;
    save();
    let vol = document.getElementById("totalVolume").innerText;
    document.getElementById("summaryResult").innerHTML = `Час: <b>${currentDuration}</b><br>Тоннаж: <b>${vol}</b>`;
    document.getElementById("modal").style.display = "flex";
}

function updateChart() {
    const ctx = document.getElementById('myChart').getContext('2d');
    const sel = document.getElementById("chartExSelect").value;
    if(!sel || !ctx) return;
    let labs = [], wts = [], e1pms = [];
    Object.keys(data).sort().forEach(d => {
        let e = data[d].find(x => x.name === sel);
        if(e) {
            labs.push(d.split('-').slice(1).join('/'));
            let bestS = e.arr.reduce((a, b) => (a.w > b.w ? a : b));
            wts.push(Math.max(...e.arr.map(s => s.w)));
            e1pms.push((bestS.w * (1 + bestS.r/30)).toFixed(1));
        }
    });
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labs, datasets: [{ label: 'Вага', data: wts, borderColor: '#3b82f6'}, { label: '1ПМ', data: e1pms, borderColor: '#f59e0b', borderDash: [5,5]}] }
    });
}

async function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    doc.text("PRO-FIT ELITE+ REPORT", 20, y); y += 15;
    Object.keys(data).sort().reverse().forEach(d => {
        if(y > 270) { doc.addPage(); y = 20; }
        doc.setFontSize(12); doc.setTextColor(59, 130, 246);
        doc.text(`ДАТА: ${d} | ЧАС: ${durations[d] || '?'}`, 20, y); y += 7;
        doc.setTextColor(0);
        data[d].forEach(ex => {
            let sStr = ex.arr.map(s => `${s.r}x${s.w}kg`).join(', ');
            doc.text(`- ${ex.name}: ${sStr}`, 25, y); y += 6;
        });
        y += 5;
    });
    doc.save(`ProFit_Report.pdf`);
}

function copyDay() { localStorage.setItem("copy", JSON.stringify(data[date])); alert("Copied"); }
function pasteDay() { let c = localStorage.getItem("copy"); if(c) { data[date]=JSON.parse(c); save(); updateUI(); } }

(()=>{
    let t = new Date().toISOString().split("T")[0];
    date = t; document.getElementById("date").value = t;
    document.getElementById("dayNotes").value = notes[date] || "";
    updateUI();
})();
</script>
</body>
</html>
