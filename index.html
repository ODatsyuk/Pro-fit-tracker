<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro-Fit Tracker AI FULL+</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;}

.header{
padding:15px;
text-align:center;
font-size:20px;
}

.container{padding:15px;}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

input,select{background:#0f172a;color:white;}

button{
background:#00f5ff;
font-weight:bold;
cursor:pointer;
}

.exercise{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
transition:transform 0.15s ease, opacity 0.15s ease;
}

.exercise.dragging{
opacity:0.6;
transform:scale(1.02);
}

.set{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px;
margin-top:5px;
background:#0b1220;
border-radius:8px;
}

.set.done{
text-decoration:line-through;
opacity:0.6;
}

.deleteBtn{
background:#ff3b3b;
margin-top:8px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:#111827;
border:1px solid #00f5ff;
padding:10px;
border-radius:12px;
color:#00f5ff;
font-size:12px;
}

.restBox{
position:fixed;
top:70px;
right:10px;
background:#111827;
border:1px solid #a78bfa;
padding:10px;
border-radius:12px;
color:#a78bfa;
font-size:12px;
}

.modal{
position:fixed;
inset:0;
background:#000000cc;
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111827;
padding:15px;
border-radius:12px;
width:90%;
}

.small{font-size:12px;opacity:0.8;}
.close{background:#ff3b3b;margin-top:10px;}

#dateInfo{
text-align:center;
font-size:14px;
color:#00f5ff;
padding:10px;
}
</style>
</head>

<body>

<div class="header">🏋️ Pro-Fit Tracker AI FULL+</div>

<div class="card" id="dateInfo">📅</div>

<div class="timer" id="timerBox">⏱ 00:00</div>
<div class="restBox" id="restBox">⏳ 0s</div>

<div class="container">

<div class="card">
<input type="date" id="date">
</div>

<div class="card">
<h3>⏳ Відпочинок</h3>
<div class="small">Між підходами (сек)</div>
<input id="restSet" type="number" value="90">

<div class="small">Між вправами (сек)</div>
<input id="restEx" type="number" value="180">
</div>

<div class="card">
<h3>➕ Додати вправу</h3>

<input id="name" placeholder="Назва">
<input id="sets" type="number" placeholder="Підходи">
<input id="reps" type="number" placeholder="Повторення">
<input id="weight" type="number" placeholder="Вага (кг)">

<button onclick="add()">Додати</button>
</div>

<div class="card">
<button onclick="start()">▶ Старт</button>
<button onclick="finish()">🏁 Завершити тренування</button>

<button onclick="copyDay()">📋 Копіювати день</button>
<button onclick="pasteDay()">📥 Вставити день</button>
</div>

<div id="list"></div>

</div>

<!-- AI -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>🧠 AI Анкета</h3>

<div class="small">Важкість (1-5)</div>
<input id="q1" type="number">

<div class="small">Відказ?</div>
<select id="q2">
<option value="no">Ні</option>
<option value="yes">Так</option>
</select>

<div class="small">Енергія</div>
<select id="q3">
<option value="low">Низька</option>
<option value="mid">Середня</option>
<option value="high">Висока</option>
</select>

<button onclick="getAI()">Отримати пораду</button>
<button class="close" onclick="closeAI()">Закрити</button>

<div id="result" style="margin-top:10px;color:#00f5ff;"></div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fit")) || {};
let date="";
let active=false;
let startTime=null;
let mainTimer=null;
let restTimer=null;
let done={};

/* DATE */
document.getElementById("date").onchange=(e)=>{
date=e.target.value;
render();
updateDateInfo();
};

function save(){
localStorage.setItem("fit",JSON.stringify(data));
}

/* ADD */
function add(){

let d=document.getElementById("date").value;
let name=document.getElementById("name").value;
let sets=+document.getElementById("sets").value;
let reps=+document.getElementById("reps").value;
let weight=+document.getElementById("weight").value;

if(!d||!name||!sets||!reps||!weight) return;

if(!data[d]) data[d]=[];

let arr=[];
for(let i=0;i<sets;i++){
arr.push({r:reps,w:weight});
}

data[d].push({name,arr,note:""});

save();
render();
}

/* COPY / PASTE */
function copyDay(){
if(!data[date]) return;
localStorage.setItem("copiedDay",JSON.stringify(data[date]));
alert("День скопійовано ✔");
}

function pasteDay(){
let c=localStorage.getItem("copiedDay");
if(!c){alert("Немає копії ❌");return;}

data[date]=JSON.parse(JSON.stringify(JSON.parse(c)));

save();
render();
alert("Вставлено ✔");
}

/* DATE INFO */
function updateDateInfo(){

let d=new Date(date || new Date());

let days=[
"Неділя","Понеділок","Вівторок","Середа",
"Четвер","П’ятниця","Субота"
];

let dayName=days[d.getDay()];
let formatted=d.toISOString().split("T")[0];

document.getElementById("dateInfo").innerText=
`📅 ${formatted} | ${dayName}`;
}

/* START */
function start(){
active=true;
done={};
startTime=new Date();

mainTimer=setInterval(()=>{
let d=Math.floor((new Date()-startTime)/1000);
let m=Math.floor(d/60),s=d%60;
timerBox.innerText=`⏱ ${m}:${s<10?'0':''}${s}`;
},1000);
}

/* REST */
function showRest(sec){
let t=sec;
clearInterval(restTimer);

restTimer=setInterval(()=>{
restBox.innerText=`⏳ ${t}s`;
t--;
if(t<0){
clearInterval(restTimer);
restBox.innerText="⏳ готово";
}
},1000);
}

/* DONE */
function doneSet(i,j,last){
done[i+"-"+j]=true;

if(last) showRest(+restEx.value);
else showRest(+restSet.value);

render();
}

/* FINISH */
function finish(){
active=false;
clearInterval(mainTimer);
document.getElementById("modal").style.display="flex";
}

/* AI */
function getAI(){

let effort=+q1.value;
let fail=q2.value;
let energy=q3.value;

let msg="";

if(effort>=4 && fail==="yes"){
msg="🔴 Перевантаження";
}
else if(energy==="high"){
msg="🟢 Прогрес можливий";
}
else{
msg="🟡 Стабільний режим";
}

result.innerText=msg;
}

function closeAI(){
modal.style.display="none";
}

/* DELETE FIX ✔ */
function deleteExercise(i){
data[date].splice(i,1);
save();
render();
}

/* RENDER */
function render(){

list.innerHTML="";
if(!data[date]) return;

data[date].forEach((e,i)=>{

let sets=e.arr.map((s,j)=>`
<div class="set ${done[i+"-"+j]?'done':''}">
${s.r} x 
<input type="number" value="${s.w}"
onchange="updateWeight(${i},${j},this.value)"
style="width:70px;">
кг
<button onclick="doneSet(${i},${j},${j===e.arr.length-1})">✔</button>
</div>
`).join("");

list.innerHTML+=`
<div class="card exercise">

<b>${e.name}</b>

${sets}

<button class="deleteBtn" onclick="deleteExercise(${i})">🗑 Видалити</button>

</div>`;
});
}

/* INIT */
(()=>{
let today=new Date().toISOString().split("T")[0];
date=today;
document.getElementById("date").value=today;
render();
updateDateInfo();
})();

</script>

</body>
</html>
