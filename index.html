<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro-Fit Tracker AI FULL+</title>

<style>
/* Основна палітра: темний фон та приглушений синій */
:root {
    --accent: #3b82f6; /* Новий, менш контрастний синій */
    --accent-hover: #2563eb;
    --bg: #0b0f1a;
    --card-bg: #111827;
    --input-bg: #0f172a;
    --danger: #ef4444;
}

body{margin:0;font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color:white;}

.header{
padding:20px;
text-align:center;
font-size:22px;
font-weight: bold;
letter-spacing: 1px;
}

.container{padding:15px; max-width: 600px; margin: 0 auto;}

.card{
background: var(--card-bg);
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
outline: none;
box-sizing: border-box;
font-size: 14px;
}

input,select{background: var(--input-bg); color:white; border: 1px solid #1e293b;}

button{
background: var(--accent);
color: white;
font-weight:bold;
cursor:pointer;
transition: all 0.2s;
}

button:hover { background: var(--accent-hover); }
button:active { transform: scale(0.98); }

.exercise{
background: var(--input-bg);
padding:15px;
border-radius:14px;
margin-top:12px;
cursor: grab;
border: 1px solid #1e293b;
}

.set{
display:flex;
align-items:center;
justify-content:space-between;
padding:8px;
margin-top:8px;
background: var(--bg);
border-radius:10px;
}

.set input {
    width: 55px;
    background: #1e293b;
    text-align: center;
    border: none;
    margin: 0 5px;
    padding: 5px;
    border-radius: 6px;
}

.set.done{
text-decoration:line-through;
opacity:0.3;
background: #060a13;
}

.deleteBtn{
background: transparent;
color: var(--danger);
border: 1px solid var(--danger);
margin-top:12px;
}
.deleteBtn:hover { background: var(--danger); color: white; }

.timer, .restBox{
position:fixed;
right:15px;
background: var(--card-bg);
padding:12px;
border-radius:14px;
font-size:13px;
font-weight: bold;
z-index: 100;
box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
}

.timer { top:15px; border: 1px solid var(--accent); color: var(--accent); }
.restBox { top:80px; border: 1px solid #a78bfa; color: #a78bfa; }

.modal{
position:fixed;
inset:0;
background: rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index: 1000;
backdrop-filter: blur(4px);
}

.modal-content{
background: var(--card-bg);
padding:25px;
border-radius:20px;
width:85%;
max-width: 400px;
}

.small{font-size:12px; opacity:0.6; margin-top: 5px;}
.close{background: #374151; margin-top:15px;}

#dateInfo {
text-align:center;
font-size:15px;
color: var(--accent);
font-weight: 500;
}

#result {
    line-height: 1.5;
    font-size: 14px;
    padding: 10px;
    border-radius: 8px;
    background: #0f172a;
}
</style>
</head>

<body>

<div class="header">🏋️ Pro-Fit Tracker</div>

<div class="card" id="dateInfo">📅 Завантаження...</div>

<div class="timer" id="timerBox">⏱ 00:00</div>
<div class="restBox" id="restBox">⏳ Відпочинок</div>

<div class="container">

<div class="card">
    <input type="date" id="date">
</div>

<div class="card">
    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <div class="small">Відпочинок (сек)</div>
            <input id="restSet" type="number" value="90">
        </div>
        <div style="flex:1">
            <div class="small">Між вправами</div>
            <input id="restEx" type="number" value="180">
        </div>
    </div>
</div>

<div class="card">
    <h3 style="margin-top:0">➕ Додати вправу</h3>
    <input id="name" placeholder="Назва вправи (напр. Жим лежачи)">
    <div style="display:flex; gap:8px;">
        <input id="sets" type="number" placeholder="Підходи">
        <input id="reps" type="number" placeholder="Повтори">
        <input id="weight" type="number" placeholder="Вага (кг)">
    </div>
    <button onclick="add()">Додати вправу</button>
</div>

<div class="card">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="start()">▶ Старт</button>
        <button onclick="finish()" style="background:#10b981">🏁 Фініш</button>
        <button onclick="copyDay()" style="background:#4b5563">📋 Копія</button>
        <button onclick="pasteDay()" style="background:#4b5563">📥 Вставити</button>
    </div>
    <button onclick="clearDay()" style="background:#ef4444; margin-top:10px;">🗑 Очистити цей день</button>
</div>

<div id="list"></div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">🧠 AI Аналіз</h2>
        
        <div class="small">Наскільки важким було тренування? (1-10)</div>
        <input id="q1" type="number" min="1" max="10" value="7">

        <div class="small">Чи були підходи до повної відмови?</div>
        <select id="q2">
            <option value="no">Ні, був запас</option>
            <option value="yes">Так, в останніх підходах</option>
            <option value="hardcore">Так, у кожному підході</option>
        </select>

        <div class="small">Ваш рівень енергії зараз?</div>
        <select id="q3">
            <option value="low">Виснажений (Low)</option>
            <option value="mid">Нормальний (Mid)</option>
            <option value="high">Бадьорий (High)</option>
        </select>

        <button onclick="getAI()" style="margin-top:20px;">Отримати рекомендацію</button>
        <div id="result" style="margin-top:15px; color:#93c5fd; min-height: 40px;"></div>
        <button class="close" onclick="closeAI()">Закрити</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("fit")) || {};
let date="";
let active=false;
let startTime=null;
let mainTimer=null;
let restTimer=null;
let done={};
let draggedItemIndex = null;

document.getElementById("date").onchange=(e)=>{
    date=e.target.value;
    render();
    updateDateInfo();
};

function save(){ localStorage.setItem("fit",JSON.stringify(data)); }

function add(){
    let d=document.getElementById("date").value;
    let n=document.getElementById("name");
    let s=document.getElementById("sets");
    let r=document.getElementById("reps");
    let w=document.getElementById("weight");

    if(!d || !n.value || !s.value) return;
    if(!data[d]) data[d]=[];

    let arr=[];
    for(let i=0; i<+s.value; i++){
        arr.push({r: +r.value || 0, w: +w.value || 0});
    }

    data[d].push({name: n.value, arr});
    save();
    render();

    n.value=""; s.value=""; r.value=""; w.value="";
}

/* DRAG & DROP */
function drag(ev, index) { draggedItemIndex = index; ev.dataTransfer.setData("text", index); }
function allowDrop(ev) { ev.preventDefault(); }
function drop(ev, targetIndex) {
    ev.preventDefault();
    const movedItem = data[date].splice(draggedItemIndex, 1)[0];
    data[date].splice(targetIndex, 0, movedItem);
    save(); render();
}

function updateWeight(exIdx, setIdx, val) { data[date][exIdx].arr[setIdx].w = +val; save(); }
function updateReps(exIdx, setIdx, val) { data[date][exIdx].arr[setIdx].r = +val; save(); }

function clearDay() {
    if(confirm("Видалити всі дані за сьогодні?")) { data[date] = []; save(); render(); }
}

function copyDay(){
    if(!data[date]) return;
    localStorage.setItem("copiedDay", JSON.stringify(data[date]));
    alert("Дані дня скопійовано");
}

function pasteDay(){
    let c = localStorage.getItem("copiedDay");
    if(!c) return;
    data[date] = JSON.parse(c);
    save(); render();
}

function updateDateInfo(){
    let d = new Date(date || new Date());
    let days = ["Неділя","Понеділок","Вівторок","Середа","Четвер","П’ятниця","Субота"];
    document.getElementById("dateInfo").innerText = `📅 ${date} | ${days[d.getDay()]}`;
}

function start(){
    active=true; done={}; startTime=new Date();
    if(mainTimer) clearInterval(mainTimer);
    mainTimer = setInterval(()=>{
        let diff = Math.floor((new Date()-startTime)/1000);
        let m=Math.floor(diff/60), s=diff%60;
        document.getElementById("timerBox").innerText = `⏱ ${m}:${s<10?'0':''}${s}`;
    }, 1000);
}

function showRest(sec){
    let t=sec; clearInterval(restTimer);
    restTimer = setInterval(()=>{
        document.getElementById("restBox").innerText = `⏳ ${t}s`;
        t--;
        if(t<0){ clearInterval(restTimer); document.getElementById("restBox").innerText = "⏳ Готово!"; }
    },1000);
}

function doneSet(i,j,last){
    let key = i+"-"+j;
    done[key] = !done[key];
    if(done[key]){
        let sVal = +document.getElementById("restSet").value;
        let eVal = +document.getElementById("restEx").value;
        showRest(last ? eVal : sVal);
    }
    render();
}

function finish(){
    clearInterval(mainTimer);
    document.getElementById("modal").style.display="flex";
}

/* ПОКРАЩЕНА ЛОГІКА AI */
function getAI(){
    let rpe = +document.getElementById("q1").value;
    let fail = document.getElementById("q2").value;
    let energy = document.getElementById("q3").value;
    let msg = "";

    if(rpe >= 9 || fail === "hardcore"){
        msg = "⚠️ <b>Центральна нервова система виснажена.</b> Наступне тренування зробіть 'легким' (зменште вагу на 20%). Дайте тілу 48 годин на відновлення.";
    } else if (energy === "high" && rpe < 8){
        msg = "🚀 <b>Потенціал для прогресу!</b> Ви почуваєтесь добре. На наступному тренуванні спробуйте додати +2.5 кг або зробіть на 2 повторення більше.";
    } else if (energy === "low"){
        msg = "💤 <b>Пріоритет на відновлення.</b> Зверніть увагу на сон та кількість білка. Сьогодні ви відпрацювали добре, але не тисніть на максимум завтра.";
    } else {
        msg = "✅ <b>Стабільний режим.</b> Навантаження підібрано ідеально. Продовжуйте працювати за цим планом ще 1-2 тижні перед підвищенням ваги.";
    }

    document.getElementById("result").innerHTML = msg;
}

function closeAI(){ document.getElementById("modal").style.display="none"; }

function deleteExercise(i){
    data[date].splice(i,1);
    save(); render();
}

function render(){
    let listEl = document.getElementById("list");
    listEl.innerHTML="";
    if(!data[date]) return;

    data[date].forEach((e,i)=>{
        let setsHTML=e.arr.map((s,j)=>`
        <div class="set ${done[i+"-"+j]?'done':''}">
            <div>
                <input type="number" value="${s.r}" onchange="updateReps(${i},${j},this.value)"> 
                x 
                <input type="number" value="${s.w}" onchange="updateWeight(${i},${j},this.value)"> кг
            </div>
            <button onclick="doneSet(${i},${j},${j===e.arr.length-1})" style="width:40px; margin:0; padding:5px;">✔</button>
        </div>
        `).join("");

        listEl.innerHTML+=`
        <div class="card exercise" draggable="true" ondragstart="drag(event, ${i})" ondragover="allowDrop(event)" ondrop="drop(event, ${i})">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <b style="color: var(--accent)">${e.name}</b>
                <span style="font-size:12px; opacity:0.4;">☰</span>
            </div>
            ${setsHTML}
            <button class="deleteBtn" onclick="deleteExercise(${i})">🗑 Видалити</button>
        </div>`;
    });
}

(()=>{
    let today=new Date().toISOString().split("T")[0];
    date=today;
    document.getElementById("date").value=today;
    render();
    updateDateInfo();
})();
</script>
</body>
</html>
