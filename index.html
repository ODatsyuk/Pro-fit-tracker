<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro-Fit Tracker AI FULL+</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;}

.header{
padding:15px;
text-align:center;
font-size:20px;
}

.container{padding:15px;}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
outline: none;
}

input,select{background:#0f172a;color:white;}

button{
background:#00f5ff;
font-weight:bold;
cursor:pointer;
transition: opacity 0.2s;
}

button:active { opacity: 0.7; }

.exercise{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor: grab;
border: 1px solid transparent;
}

.exercise:active { cursor: grabbing; }

.set{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px;
margin-top:5px;
background:#0b1220;
border-radius:8px;
}

.set input {
    width: 50px;
    background: transparent;
    text-align: center;
    border-bottom: 1px solid #334155;
    margin: 0 5px;
    padding: 2px;
}

.set.done{
text-decoration:line-through;
opacity:0.4;
}

.deleteBtn{
background:#ff3b3b;
margin-top:8px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:#111827;
border:1px solid #00f5ff;
padding:10px;
border-radius:12px;
color:#00f5ff;
font-size:12px;
z-index: 100;
}

.restBox{
position:fixed;
top:70px;
right:10px;
background:#111827;
border:1px solid #a78bfa;
padding:10px;
border-radius:12px;
color:#a78bfa;
font-size:12px;
z-index: 100;
}

.modal{
position:fixed;
inset:0;
background:#000000cc;
display:none;
align-items:center;
justify-content:center;
z-index: 1000;
}

.modal-content{
background:#111827;
padding:15px;
border-radius:12px;
width:90%;
}

.small{font-size:12px;opacity:0.8;}
.close{background:#ff3b3b;margin-top:10px;}

#dateInfo{
text-align:center;
font-size:14px;
color:#00f5ff;
padding:10px;
}
</style>
</head>

<body>

<div class="header">🏋️ Pro-Fit Tracker AI FULL+</div>

<div class="card" id="dateInfo">📅</div>

<div class="timer" id="timerBox">⏱ 00:00</div>
<div class="restBox" id="restBox">⏳ 0s</div>

<div class="container">

<div class="card">
<input type="date" id="date">
</div>

<div class="card">
<h3>⏳ Відпочинок</h3>
<div class="small">Між підходами (сек)</div>
<input id="restSet" type="number" value="90">

<div class="small">Між вправами (сек)</div>
<input id="restEx" type="number" value="180">
</div>

<div class="card">
<h3>➕ Додати вправу</h3>

<input id="name" placeholder="Назва">
<input id="sets" type="number" placeholder="Підходи">
<input id="reps" type="number" placeholder="Повторення">
<input id="weight" type="number" placeholder="Вага (кг)">

<button onclick="add()">Додати</button>
</div>

<div class="card">
<button onclick="start()">▶ Старт</button>
<button onclick="finish()">🏁 Завершити тренування</button>
<button onclick="copyDay()">📋 Копіювати день</button>
<button onclick="pasteDay()">📥 Вставити день</button>
<button onclick="clearDay()" style="background:#ff3b3b; margin-top:10px;">🗑 Очистити день</button>
</div>

<div id="list"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>🧠 AI Анкета</h3>

<div class="small">Важкість (1-5)</div>
<input id="q1" type="number">

<div class="small">Відказ?</div>
<select id="q2">
<option value="no">Ні</option>
<option value="yes">Так</option>
</select>

<div class="small">Енергія</div>
<select id="q3">
<option value="low">Низька</option>
<option value="mid">Середня</option>
<option value="high">Висока</option>
</select>

<button onclick="getAI()">Отримати пораду</button>
<button class="close" onclick="closeAI()">Закрити</button>

<div id="result" style="margin-top:10px;color:#00f5ff;"></div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fit")) || {};
let date="";
let active=false;
let startTime=null;
let mainTimer=null;
let restTimer=null;
let done={};
let draggedItemIndex = null;

/* DATE */
document.getElementById("date").onchange=(e)=>{
date=e.target.value;
render();
updateDateInfo();
};

function save(){
localStorage.setItem("fit",JSON.stringify(data));
}

/* ADD */
function add(){
let d=document.getElementById("date").value;
let nameEl=document.getElementById("name");
let setsEl=document.getElementById("sets");
let repsEl=document.getElementById("reps");
let weightEl=document.getElementById("weight");

if(!d || !nameEl.value || !setsEl.value) return;

if(!data[d]) data[d]=[];

let arr=[];
for(let i=0;i<+setsEl.value;i++){
    arr.push({r: +repsEl.value, w: +weightEl.value});
}

data[d].push({name: nameEl.value, arr, note:""});

save();
render();

// Очищення полів
nameEl.value = "";
setsEl.value = "";
repsEl.value = "";
weightEl.value = "";
}

/* DRAG & DROP */
function drag(ev, index) {
    draggedItemIndex = index;
    ev.dataTransfer.setData("text", index);
}

function allowDrop(ev) {
    ev.preventDefault();
}

function drop(ev, targetIndex) {
    ev.preventDefault();
    if (draggedItemIndex === null || draggedItemIndex === targetIndex) return;
    const movedItem = data[date].splice(draggedItemIndex, 1)[0];
    data[date].splice(targetIndex, 0, movedItem);
    save();
    render();
}

/* EDIT DATA */
function updateWeight(exIdx, setIdx, val) {
    data[date][exIdx].arr[setIdx].w = +val;
    save();
}

function updateReps(exIdx, setIdx, val) {
    data[date][exIdx].arr[setIdx].r = +val;
    save();
}

function clearDay() {
    if(confirm("Видалити всі вправи за цей день?")) {
        data[date] = [];
        save();
        render();
    }
}

/* COPY / PASTE */
function copyDay(){
if(!data[date]) return;
localStorage.setItem("copiedDay",JSON.stringify(data[date]));
alert("День скопійовано ✔");
}

function pasteDay(){
let c=localStorage.getItem("copiedDay");
if(!c){alert("Немає копії ❌");return;}
data[date]=JSON.parse(c);
save();
render();
alert("Вставлено ✔");
}

/* DATE INFO */
function updateDateInfo(){
let d=new Date(date || new Date());
let days=["Неділя","Понеділок","Вівторок","Середа","Четвер","П’ятниця","Субота"];
let dayName=days[d.getDay()];
let formatted=d.toISOString().split("T")[0];
document.getElementById("dateInfo").innerText=`📅 ${formatted} | ${dayName}`;
}

/* START / TIMER */
function start(){
active=true;
done={};
startTime=new Date();
if(mainTimer) clearInterval(mainTimer);
mainTimer=setInterval(()=>{
let d=Math.floor((new Date()-startTime)/1000);
let m=Math.floor(d/60),s=d%60;
timerBox.innerText=`⏱ ${m}:${s<10?'0':''}${s}`;
},1000);
}

function showRest(sec){
let t=sec;
clearInterval(restTimer);
restTimer=setInterval(()=>{
restBox.innerText=`⏳ ${t}s`;
t--;
if(t<0){
clearInterval(restTimer);
restBox.innerText="⏳ готово";
}
},1000);
}

function doneSet(i,j,last){
done[i+"-"+j]=!done[i+"-"+j];
if(done[i+"-"+j]){
    if(last) showRest(+document.getElementById("restEx").value);
    else showRest(+document.getElementById("restSet").value);
}
render();
}

function finish(){
active=false;
clearInterval(mainTimer);
document.getElementById("modal").style.display="flex";
}

/* AI */
function getAI(){
let effort=+q1.value;
let fail=q2.value;
let energy=q3.value;
let msg="";
if(effort>=4 && fail==="yes") msg="🔴 Перевантаження. Зменш вагу наступного разу.";
else if(energy==="high") msg="🟢 Чудова форма! Можна спробувати +1-2 кг.";
else msg="🟡 Стабільний прогрес. Продовжуй в тому ж дусі.";
result.innerText=msg;
}

function closeAI(){ modal.style.display="none"; }

function deleteExercise(i){
data[date].splice(i,1);
save();
render();
}

/* RENDER */
function render(){
let listEl = document.getElementById("list");
listEl.innerHTML="";
if(!data[date]) return;

data[date].forEach((e,i)=>{
let setsHTML=e.arr.map((s,j)=>`
<div class="set ${done[i+"-"+j]?'done':''}">
    <div>
        <input type="number" value="${s.r}" onchange="updateReps(${i},${j},this.value)"> 
        x 
        <input type="number" value="${s.w}" onchange="updateWeight(${i},${j},this.value)"> кг
    </div>
    <button onclick="doneSet(${i},${j},${j===e.arr.length-1})" style="width:40px; margin:0;">✔</button>
</div>
`).join("");

listEl.innerHTML+=`
<div class="card exercise" draggable="true" ondragstart="drag(event, ${i})" ondragover="allowDrop(event)" ondrop="drop(event, ${i})">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <b>${e.name}</b>
        <span style="font-size:10px; opacity:0.5;">≡ перетягнути</span>
    </div>
    ${setsHTML}
    <button class="deleteBtn" onclick="deleteExercise(${i})">🗑 Видалити вправу</button>
</div>`;
});
}

/* INIT */
(()=>{
let today=new Date().toISOString().split("T")[0];
date=today;
document.getElementById("date").value=today;
render();
updateDateInfo();
})();

</script>
</body>
</html>
