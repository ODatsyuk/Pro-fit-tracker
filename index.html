<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Pro-Fit Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f1a">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:white;}
.header{padding:15px;text-align:center;font-size:20px;}
.container{padding:15px;}
.card{background:#111827;padding:15px;border-radius:16px;margin-bottom:15px;}
input,select,button{width:100%;padding:10px;margin-top:5px;border-radius:10px;border:none;}
input,select{background:#0f172a;color:white;}
button{background:#00f5ff;font-weight:bold;}
.exercise{background:#0f172a;padding:10px;border-radius:12px;margin-top:10px;}
.set{display:flex;justify-content:space-between;padding:8px;margin-top:5px;background:#0b1220;border-radius:8px;}
.set.done{text-decoration:line-through;opacity:0.6;}
.timer{position:fixed;top:10px;right:10px;background:#111827;border:1px solid #00f5ff;padding:10px;border-radius:12px;color:#00f5ff;font-size:12px;}
canvas{background:#0f172a;border-radius:12px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">🏋️ Pro-Fit Tracker</div>

<div class="timer" id="timerBox">⏱ 00:00<br>⏳ -</div>

<div class="container">

<div class="card">
<input type="date" id="date">
</div>

<div class="card">
<h3>Додати вправу</h3>
<input id="name" placeholder="Назва">
<input id="sets" type="number" placeholder="Підходи">
<input id="reps" type="number" placeholder="Повторення">
<input id="weight" type="number" placeholder="Вага (кг)">
<button onclick="add()">Додати</button>
</div>

<div class="card">
<button onclick="start()">▶ Старт</button>
<button onclick="end()">🏁 Фініш</button>
</div>

<div class="card">
<h3>📊 Прогрес</h3>
<select id="exerciseSelect"></select>
<canvas id="chart" height="200"></canvas>
</div>

<div id="list"></div>

</div>

<script>
let data=JSON.parse(localStorage.getItem("fit"))||{};
let date="";
let active=false,startTime=null,mainTimer=null;
let done={};

dateInput=document.getElementById("date");

dateInput.onchange=(e)=>{
    date=e.target.value;
    render();
};

function save(){localStorage.setItem("fit",JSON.stringify(data));}

function add(){
    if(!date)return;
    let n=name.value,s=+sets.value,r=+reps.value,w=+weight.value;
    if(!n||!s||!r||!w)return;
    if(!data[date])data[date]=[];
    let arr=[];
    for(let i=0;i<s;i++)arr.push({r,w});
    data[date].push({n,arr});
    save();
    render();
    updateExerciseList();
}

function start(){
    active=true;
    done={};
    startTime=new Date();
    timer();
}

function timer(){
    clearInterval(mainTimer);
    mainTimer=setInterval(()=>{
        let d=Math.floor((new Date()-startTime)/1000);
        let m=Math.floor(d/60),s=d%60;
        timerBox.innerHTML=`⏱ ${m}:${s<10?'0':''}${s}`;
    },1000);
}

function doneSet(i,j){
    if(!active)return;
    done[i+"-"+j]=true;
    render();
}

function end(){
    active=false;
    clearInterval(mainTimer);
    done={};
    render();
}

function render(){
    list.innerHTML="";
    if(!data[date])return;

    data[date].forEach((e,i)=>{
        let setsHTML=e.arr.map((s,j)=>{
            let d=done[i+"-"+j];
            return `<div class="set ${d?'done':''}">
                ${s.r} x ${s.w} кг
                <button onclick="doneSet(${i},${j})">✔</button>
            </div>`;
        }).join("");

        list.innerHTML+=`
        <div class="card exercise">
            <b>${e.n}</b>
            ${setsHTML}
        </div>`;
    });
}

/* 🔥 ГРАФІК */

function updateExerciseList(){
    let select=document.getElementById("exerciseSelect");
    let names=new Set();

    Object.values(data).forEach(day=>{
        day.forEach(ex=>names.add(ex.n));
    });

    select.innerHTML=[...names].map(n=>`<option>${n}</option>`).join("");
}

document.getElementById("exerciseSelect").onchange=drawChart;

function drawChart(){
    let name=exerciseSelect.value;
    let points=[];

    Object.keys(data).sort().forEach(d=>{
        let day=data[d];
        let max=0;

        day.forEach(ex=>{
            if(ex.n===name){
                ex.arr.forEach(s=>{
                    if(s.w>max)max=s.w;
                });
            }
        });

        if(max>0)points.push({d,max});
    });

    let canvas=document.getElementById("chart");
    let ctx=canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(points.length<2)return;

    let maxW=Math.max(...points.map(p=>p.max));
    let stepX=canvas.width/(points.length-1);

    ctx.beginPath();
    ctx.strokeStyle="#00f5ff";
    ctx.lineWidth=3;

    points.forEach((p,i)=>{
        let x=i*stepX;
        let y=canvas.height-(p.max/maxW)*canvas.height;

        if(i===0)ctx.moveTo(x,y);
        else ctx.lineTo(x,y);

        ctx.fillStyle="#00f5ff";
        ctx.beginPath();
        ctx.arc(x,y,4,0,Math.PI*2);
        ctx.fill();
    });

    ctx.stroke();
}

/* INIT */
(function(){
    let today=new Date().toISOString().split("T")[0];
    dateInput.value=today;
    date=today;
    updateExerciseList();
})();
</script>

</body>
</html>
