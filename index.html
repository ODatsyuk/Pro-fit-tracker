<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro-Fit Tracker AI FULL+</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;}

.header{
padding:15px;
text-align:center;
font-size:20px;
}

.container{padding:15px;}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

input,select{background:#0f172a;color:white;}

button{
background:#00f5ff;
font-weight:bold;
cursor:pointer;
}

.exercise{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.set{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px;
margin-top:5px;
background:#0b1220;
border-radius:8px;
}

.set.done{
text-decoration:line-through;
opacity:0.6;
}

.deleteBtn{
background:#ff3b3b;
margin-top:8px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:#111827;
border:1px solid #00f5ff;
padding:10px;
border-radius:12px;
color:#00f5ff;
font-size:12px;
}

.restBox{
position:fixed;
top:70px;
right:10px;
background:#111827;
border:1px solid #a78bfa;
padding:10px;
border-radius:12px;
color:#a78bfa;
font-size:12px;
}

.modal{
position:fixed;
inset:0;
background:#000000cc;
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111827;
padding:15px;
border-radius:12px;
width:90%;
}

.small{font-size:12px;opacity:0.8;}
.close{background:#ff3b3b;margin-top:10px;}

#dateInfo{
text-align:center;
font-size:14px;
color:#00f5ff;
padding:10px;
}
</style>
</head>

<body>

<div class="header">🏋️ Pro-Fit Tracker AI FULL+</div>

<div class="card" id="dateInfo">📅</div>

<div class="timer" id="timerBox">⏱ 00:00</div>
<div class="restBox" id="restBox">⏳ 0s</div>

<div class="container">

<div class="card">
<input type="date" id="date">
</div>

<div class="card">
<h3>⏳ Відпочинок</h3>
<input id="restSet" type="number" value="90">
<input id="restEx" type="number" value="180">
</div>

<div class="card">
<h3>➕ Додати вправу</h3>

<input id="name" placeholder="Назва">
<input id="sets" type="number" placeholder="Підходи">
<input id="reps" type="number" placeholder="Повторення">
<input id="weight" type="number" placeholder="Вага (кг)">

<button onclick="add()">Додати</button>
</div>

<div class="card">
<button onclick="start()">▶ Старт</button>
<button onclick="finish()">🏁 Завершити тренування</button>

<button onclick="copyDay()">📋 Копіювати день</button>
<button onclick="pasteDay()">📥 Вставити день</button>
</div>

<div id="list"></div>

</div>

<!-- AI -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>🧠 AI Анкета</h3>

<input id="q1" type="number" placeholder="Важкість 1-5">

<select id="q2">
<option value="no">Ні відказу</option>
<option value="yes">Був відказ</option>
</select>

<select id="q3">
<option value="low">Низька енергія</option>
<option value="mid">Середня</option>
<option value="high">Висока</option>
</select>

<button onclick="getAI()">Отримати пораду</button>
<button class="close" onclick="closeAI()">Закрити</button>

<div id="result" style="margin-top:10px;color:#00f5ff;"></div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fit")) || {};
let date="";
let active=false;
let startTime=null;
let mainTimer=null;
let restTimer=null;
let done={};

/* INIT DATE */
document.getElementById("date").onchange=(e)=>{
date=e.target.value;
render();
updateDateInfo();
};

function save(){
localStorage.setItem("fit",JSON.stringify(data));
}

/* ADD */
function add(){

if(!date) date=document.getElementById("date").value;

let name=document.getElementById("name").value;
let sets=+document.getElementById("sets").value;
let reps=+document.getElementById("reps").value;
let weight=+document.getElementById("weight").value;

if(!date||!name||!sets||!reps||!weight) return;

if(!data[date]) data[date]=[];

let arr=[];
for(let i=0;i<sets;i++){
arr.push({r:reps,w:weight});
}

data[date].push({name,arr});
save();
render();
}

/* COPY */
function copyDay(){
if(!data[date]) return;
localStorage.setItem("copiedDay",JSON.stringify(data[date]));
alert("Скопійовано ✔");
}

/* PASTE */
function pasteDay(){
let c=localStorage.getItem("copiedDay");
if(!c) return;

data[date]=JSON.parse(c);
save();
render();
alert("Вставлено ✔");
}

/* DELETE */
function deleteExercise(i){
data[date].splice(i,1);
save();
render();
}

/* UPDATE WEIGHT (FIX 🔥) */
function updateWeight(i,j,value){
data[date][i].arr[j].w=Number(value);
save();
render();
}

/* RENDER */
function render(){
list.innerHTML="";
if(!data[date]) return;

data[date].forEach((e,i)=>{

let sets=e.arr.map((s,j)=>`
<div class="set ${done[i+"-"+j]?'done':''}">
${s.r} x 
<input type="number" value="${s.w}"
onchange="updateWeight(${i},${j},this.value)"
style="width:70px;">
кг
<button onclick="done[i+'-'+j]=true;render()">✔</button>
</div>
`).join("");

list.innerHTML+=`
<div class="card exercise">

<b>${e.name}</b>

${sets}

<button class="deleteBtn" onclick="deleteExercise(${i})">🗑 Видалити</button>

</div>`;
});
}

/* AI */
function getAI(){

let effort=+q1.value;
let fail=q2.value;
let energy=q3.value;

let msg="";

if(effort>=4 && fail==="yes"){
msg="🔴 Зменш навантаження";
}
else if(energy==="high"){
msg="🟢 Можеш прогресувати";
}
else{
msg="🟡 Стабільний режим";
}

result.innerText=msg;
}

function closeAI(){
modal.style.display="none";
}

/* START */
function start(){
active=true;
startTime=new Date();

mainTimer=setInterval(()=>{
let d=Math.floor((new Date()-startTime)/1000);
timerBox.innerText=`⏱ ${d}s`;
},1000);
}

/* FINISH */
function finish(){
active=false;
clearInterval(mainTimer);
modal.style.display="flex";
}

/* DATE INFO */
function updateDateInfo(){
let d=new Date(date||new Date());
dateInfo.innerText=d.toDateString();
}

/* INIT */
(()=>{
let today=new Date().toISOString().split("T")[0];
date=today;
document.getElementById("date").value=today;
render();
updateDateInfo();
})();

</script>

</body>
</html>
