<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Pro-Fit Tracker</title>

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f1a">

<!-- 🍏 iOS APP MODE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ProFit">

<!-- 🧊 STYLE -->
<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#0b0f1a;
    color:white;
}

/* SAFE AREA */
.safe{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
}

/* HEADER (як iOS app) */
.header{
    position:sticky;
    top:0;
    background:#0b0f1a;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #111827;
}

/* FLOAT TIMER */
.timer{
    position:fixed;
    top:10px;
    right:10px;
    background:#111827;
    border:1px solid #00f5ff;
    padding:10px;
    border-radius:14px;
    color:#00f5ff;
    font-size:12px;
}

/* CONTAINER */
.container{
    padding:15px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border-radius:12px;
    border:none;
    background:#00f5ff;
    font-weight:bold;
}

/* EXERCISE */
.exercise{
    background:#0f172a;
    padding:10px;
    border-radius:12px;
    margin-top:10px;
}

/* SET */
.set{
    display:flex;
    justify-content:space-between;
    padding:8px;
    margin-top:5px;
    background:#0b1220;
    border-radius:8px;
}

.set.done{
    text-decoration:line-through;
    opacity:0.6;
}

/* DELETE */
.delete{
    background:#ff3b3b;
    padding:5px 10px;
    font-size:12px;
    width:auto;
}

/* iOS style кнопки */
.btnRow{
    display:flex;
    gap:10px;
}

.btnRow button{
    flex:1;
}
</style>
</head>

<body class="safe">

<div class="header">🏋️ Pro-Fit Tracker</div>

<div class="timer" id="timerBox">
⏱ 00:00<br>⏳ -
</div>

<div class="container">

<div class="card">
<input type="date" id="date">
</div>

<div class="card">
<h3>Відпочинок</h3>
<input id="restSet" type="number" value="90" placeholder="Між підходами">
<input id="restEx" type="number" value="180" placeholder="Між вправами">
</div>

<div class="card">
<h3>Додати вправу</h3>
<input id="name" placeholder="Назва">
<input id="sets" type="number" placeholder="Підходи">
<input id="reps" type="number" placeholder="Повторення">
<input id="weight" type="number" placeholder="Вага (кг)">
<button onclick="add()">Додати</button>
</div>

<div class="card btnRow">
<button onclick="start()">▶ Старт</button>
<button onclick="end()">🏁 Фініш</button>
</div>

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("fit")) || {};
let date = "";
let active=false;
let startTime=null;
let mainTimer=null;
let restTimer=null;
let restLeft=0;
let done={};

document.getElementById("date").onchange=(e)=>{
    date=e.target.value;
    render();
};

function save(){
    localStorage.setItem("fit",JSON.stringify(data));
}

function add(){
    if(!date) return;
    let n=name.value;
    let s=+sets.value;
    let r=+reps.value;
    let w=+weight.value;

    if(!n||!s||!r||!w) return;

    if(!data[date]) data[date]=[];

    let arr=[];
    for(let i=0;i<s;i++) arr.push({r,w});

    data[date].push({n,arr});
    save();
    render();
}

function start(){
    active=true;
    done={};
    startTime=new Date();
    timer();
}

function timer(){
    clearInterval(mainTimer);
    mainTimer=setInterval(()=>{
        let d=Math.floor((new Date()-startTime)/1000);
        let m=Math.floor(d/60);
        let s=d%60;

        timerBox.innerHTML=`
        ⏱ ${m}:${s<10?'0':''}${s}<br>
        ⏳ ${restLeft||'-'}
        `;
    },1000);
}

function rest(type){
    clearInterval(restTimer);
    restLeft= type==="set"
        ? +restSet.value
        : +restEx.value;

    restTimer=setInterval(()=>{
        restLeft--;
        if(restLeft<=0){
            restLeft=0;
            clearInterval(restTimer);
        }
    },1000);
}

function doneSet(i,j){
    if(!active) return;
    done[`${i}-${j}`]=true;
    rest("set");
    render();
}

function del(i){
    data[date].splice(i,1);
    save();
    render();
}

function end(){
    active=false;
    clearInterval(mainTimer);
    clearInterval(restTimer);
    restLeft=0;
    done={};
    render();
}

function render(){
    list.innerHTML="";
    if(!data[date]) return;

    data[date].forEach((e,i)=>{
        let sets=e.arr.map((s,j)=>{
            let d=done[`${i}-${j}`];
            return `
            <div class="set ${d?'done':''}">
                ${s.r} x ${s.w} кг
                <button onclick="doneSet(${i},${j})">✔</button>
            </div>`;
        }).join("");

        list.innerHTML+=`
        <div class="card exercise">
            <b>${e.n}</b>
            <button class="delete" onclick="del(${i})">🗑</button>
            ${sets}
        </div>`;
    });
}

/* 🔥 PWA */
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
